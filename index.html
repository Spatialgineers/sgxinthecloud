<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cascaritas Pinchos x SGX</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --sgx-gold: #FDCC0D;
            --sgx-blue: #32527B;
            --sgx-cyan: #00FFFF;
            --sgx-dark: #1A1A1A;
            --bg-color: #050505;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: var(--bg-color);
            font-family: 'Orbitron', sans-serif;
            touch-action: none;
            color: white;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* HUD Elements */
        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
            pointer-events: none;
            display: none;
        }

        .hud-stat {
            background: rgba(50, 82, 123, 0.4);
            backdrop-filter: blur(5px);
            border: 1px solid var(--sgx-gold);
            padding: 10px 20px;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--sgx-gold);
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
        }

        /* Pantallas UI */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            background: radial-gradient(circle at center, rgba(26,26,26,0.85) 0%, rgba(5,5,5,0.98) 100%);
        }

        .glass-panel {
            background: rgba(50, 82, 123, 0.15);
            backdrop-filter: blur(12px);
            border: 1px solid var(--sgx-gold);
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
            padding: clamp(20px, 5vw, 40px);
            width: 85%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }

        h1 {
            color: var(--sgx-gold);
            font-size: clamp(1.5rem, 6vw, 2.2rem);
            margin: 0 0 5px 0;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(253, 204, 13, 0.3);
        }

        h2 { 
            color: var(--sgx-cyan); 
            font-size: 0.9rem; 
            margin-top: 0; 
            letter-spacing: 2px; 
            margin-bottom: 20px;
        }
        
        p { font-family: sans-serif; font-size: 0.95rem; line-height: 1.5; margin-bottom: 25px; color: #ccc;}

        .stat-box {
            background: rgba(0, 255, 255, 0.05);
            border: 1px solid var(--sgx-cyan);
            padding: 10px;
            margin: 15px 0;
            font-family: monospace;
            font-size: 1.1rem;
            color: var(--sgx-cyan);
        }

        .sgx-btn {
            background: rgba(253, 204, 13, 0.05);
            color: var(--sgx-gold);
            border: 1px solid var(--sgx-gold);
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            width: 100%;
            display: block;
        }

        .sgx-btn:active {
            background: var(--sgx-gold);
            color: var(--bg-color);
        }

        .footer { margin-top: 20px; font-size: 0.6rem; color: #666; letter-spacing: 1px; }
        .hidden { display: none !important; }

    </style>
</head>
<body>

    <div id="hud">
        <div class="hud-stat" id="score-display">0</div>
        <div class="hud-stat" style="color: #ff0055; border-color: #ff0055;">VIDAS: <span id="lives">3</span></div>
    </div>

    <div id="ui-menu" class="overlay">
        <div class="glass-panel">
            <h1>CASCARITAS PINCHOS</h1>
            <h2>x SPATIALGINEERS</h2>
            <p>Mueve el palito y atrapa los ingredientes con la PUNTA.<br><br>¿Cuántos puedes armar antes de que salga tu orden?</p>
            <div class="stat-box" id="menu-highscore">RÉCORD LOCAL: 0</div>
            <button class="sgx-btn" onclick="startGame()">Comenzar</button>
            <div class="footer">POWERED BY SGX ENGINE</div>
        </div>
    </div>

    <div id="ui-result" class="overlay hidden">
        <div class="glass-panel">
            <h1 style="color: #ff0055;">¡SE CAYÓ!</h1>
            
            <div class="stat-box" style="text-align: left;">
                > PINCHOS: <span id="result-score" style="color: var(--sgx-gold); font-weight: bold;">0</span><br>
                > RÉCORD: <span id="result-highscore" style="color: var(--sgx-gold); font-weight: bold;">0</span><br>
                > TIEMPO ANIQUILADO: <span id="result-time" style="color: var(--sgx-gold); font-weight: bold;">0s</span>
            </div>

            <p id="motivation-msg" style="font-size: 0.85rem;"></p>
            
            <button class="sgx-btn" onclick="startGame()">Dale Otra Vez</button>
            <div class="footer">CASCARITAS PINCHOS x SGX</div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const uiMenu = document.getElementById('ui-menu');
    const uiResult = document.getElementById('ui-result');
    const hud = document.getElementById('hud');
    const scoreEl = document.getElementById('score-display');
    const livesEl = document.getElementById('lives');
    
    let w, h, frame = 0, score = 0, lives = 3, gameSpeed = 1, gameState = 'MENU';
    let startTime = 0;

    let highScore = localStorage.getItem('cascaritas_sgx_hs') || 0;
    document.getElementById('menu-highscore').innerText = `RÉCORD LOCAL: ${highScore}`;

    const ingredients = ['🥩', '🍗', '🍞', '🧅', '🧄'];
    // Eliminado catchY, ya no lo necesitamos.
    const stick = { x: 0, y: 0, w: 8, h: 180, stacked: [] };
    let fallingItems = [];

    function resize() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        stick.x = w / 2;
        stick.y = h - 220;
    }
    window.addEventListener('resize', resize);
    resize();

    function moveStick(clientX) {
        if(gameState !== 'PLAYING') return;
        stick.x = clientX;
    }
    window.addEventListener('mousemove', e => moveStick(e.clientX));
    window.addEventListener('touchmove', e => moveStick(e.touches[0].clientX));

    function spawnItem() {
        fallingItems.push({
            x: Math.random() * (w - 60) + 30,
            y: -50,
            type: ingredients[Math.floor(Math.random() * ingredients.length)],
            speed: (2.0 + Math.random() * 1.5) * gameSpeed, 
            size: 45
        });
    }

    function startGame() {
        score = 0;
        lives = 3;
        frame = 0;
        gameSpeed = 1;
        fallingItems = [];
        stick.stacked = [];
        startTime = Date.now();
        
        scoreEl.innerText = score;
        livesEl.innerText = lives;
        
        uiMenu.classList.add('hidden');
        uiResult.classList.add('hidden');
        hud.style.display = 'flex';
        gameState = 'PLAYING';
    }

    function endGame() {
        gameState = 'END';
        hud.style.display = 'none';
        
        const timePlayed = Math.floor((Date.now() - startTime) / 1000);
        const mins = Math.floor(timePlayed / 60);
        const secs = timePlayed % 60;
        const timeStr = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;

        let isNewRecord = false;
        if (score > highScore) {
            highScore = score;
            localStorage.setItem('cascaritas_sgx_hs', highScore);
            isNewRecord = true;
        }

        document.getElementById('result-score').innerText = score;
        document.getElementById('result-highscore').innerText = highScore;
        document.getElementById('result-time').innerText = timeStr;
        
        const msgEl = document.getElementById('motivation-msg');
        if (isNewRecord) {
            msgEl.innerText = "¡NUEVO RÉCORD ESTABLECIDO!";
            msgEl.style.color = "var(--sgx-cyan)";
        } else {
            msgEl.innerText = "La orden casi sale, ¿te tiras otra?";
            msgEl.style.color = "#ccc";
        }

        uiResult.classList.remove('hidden');
    }

    function update() {
        if (gameState !== 'PLAYING') return;
        frame++;
        
        if (frame % Math.max(35, 90 - Math.floor(score * 2)) === 0) spawnItem();
        gameSpeed = 1 + (score * 0.05); 

        for (let i = fallingItems.length - 1; i >= 0; i--) {
            let item = fallingItems[i];
            item.y += item.speed;

            // HITBOX ESTÁTICO: Siempre calcula contra la punta del palito (stick.y)
            const hitX = Math.abs(item.x - stick.x) < 30;
            const hitY = Math.abs((item.y + item.size/2) - stick.y) < 25;

            if (hitX && hitY) {
                // UNSHIFT: Mete el ingrediente al principio de la lista, empujando los demás hacia abajo.
                stick.stacked.unshift(item.type);
                fallingItems.splice(i, 1);
                
                if (stick.stacked.length >= 5) {
                    score++;
                    scoreEl.innerText = score;
                    stick.stacked = [];
                    
                    document.body.style.backgroundColor = 'rgba(253, 204, 13, 0.2)';
                    setTimeout(() => document.body.style.backgroundColor = 'var(--bg-color)', 100);
                }
            } else if (item.y > h) {
                lives--;
                livesEl.innerText = lives;
                fallingItems.splice(i, 1);

                document.body.style.backgroundColor = 'rgba(255, 0, 85, 0.3)';
                setTimeout(() => document.body.style.backgroundColor = 'var(--bg-color)', 100);

                if (lives <= 0) endGame();
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, w, h);

        if (gameState === 'PLAYING') {
            // Dibujar el palito
            ctx.fillStyle = '#654321';
            ctx.fillRect(stick.x - stick.w/2, stick.y, stick.w, stick.h);

            ctx.font = '45px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Dibujar ingredientes (Como usamos unshift, el index 0 siempre se dibuja en la punta)
            for (let i = 0; i < stick.stacked.length; i++) {
                ctx.fillText(stick.stacked[i], stick.x, stick.y + 25 + (i * 28));
            }

            for (let item of fallingItems) {
                ctx.fillText(item.type, item.x, item.y);
            }
        }
        update();
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
